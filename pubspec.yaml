name: aplikasigym
description: Admin & user app Gymnastik FT UMJ (demo)
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  # 📷 Scan QR
  mobile_scanner: ^7.1.4

  # 🔥 Firebase
  firebase_core: ^3.9.0
  firebase_auth: ^5.3.4
  firebase_database: ^11.1.0

  # 📦 Umum
  shared_preferences: ^2.3.2
  intl: ^0.20.2
  icons_plus: ^5.0.0
  google_fonts: ^6.3.2
  
  # 🎥 Player BARU (AMAN & SUPPORT FLUTTER TERBARU)
  youtube_player_iframe: ^5.2.0
  
  image_picker: ^1.1.2
  font_awesome_flutter: ^10.7.0
  url_launcher: ^6.3.0
  smooth_page_indicator: ^1.0.0+2
  fl_chart: ^0.66.0

  # 🧊 Cache Image Offline
  cached_network_image: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/default_profile.png
    - assets/onboard1.png
    - assets/onboard2.png
    - assets/onboard3.png
    - assets/onboard4.png
    - assets/registerprofile.png
    - assets/success.png
    - assets/logo.umj.png
    - assets/bicep.jpg
    - assets/shoulder.jpg
    - assets/chest.jpg
    - assets/back.jpg
    - assets/leg.png
    - assets/abs.jpg
    - assets/fotobackground.jpg